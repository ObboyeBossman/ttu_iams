<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('iams_theme_mode');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a1a48">
  <title>Dashboard | TTU IAMS Super Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
  <style>
    /* ── Super Admin premium surface overrides ──────────────────────────── */
    .sa-stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-lg);
      margin-bottom: var(--space-2xl);
    }
    .sa-stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .sa-stat-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-raised); }
    .sa-stat-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .sa-stat-card.accent-blue::before  { background: var(--ttu-blue); }
    .sa-stat-card.accent-gold::before  { background: var(--ttu-gold); }
    .sa-stat-card.accent-green::before { background: var(--green); }
    .sa-stat-card.accent-red::before   { background: var(--ttu-red); }
    .sa-stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
    .sa-stat-value { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .sa-stat-sub   { font-size: 12px; color: var(--text-secondary); }

    .sa-section {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-xl);
      overflow: hidden;
    }
    .sa-section-header {
      padding: var(--space-lg) var(--space-xl);
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
    }
    .sa-section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 0; }
    .sa-section-body  { padding: var(--space-lg) var(--space-xl); }

    .struct-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-lg);
    }
    .struct-item {
      text-align: center;
      padding: var(--space-xl);
      background: var(--bg-page);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
    }
    .struct-item-count { font-size: 36px; font-weight: 700; color: var(--ttu-blue); }
    .struct-item-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    [data-theme="dark"] .struct-item-count { color: var(--text-link); }

    .audit-list { display: flex; flex-direction: column; gap: 0; }
    .audit-row  {
      display: flex; align-items: center; gap: var(--space-md);
      padding: 10px 0;
      border-bottom: 1px solid var(--border-default);
      font-size: 13px;
    }
    .audit-row:last-child { border-bottom: none; }
    .audit-actor  { font-weight: 500; color: var(--text-primary); min-width: 140px; }
    .audit-action { color: var(--text-secondary); flex: 1; }
    .audit-time   { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
  </style>
</head>
<body>
<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">
      <div id="page-loading" class="page-loading-overlay"><div class="spinner-lg"></div></div>

      <div id="page-body" class="hidden page-container">
        <div class="page-header">
          <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Platform-wide system overview</p>
          </div>
        </div>

        <!-- Stat cards -->
        <div class="sa-stat-grid" id="stat-grid">
          <div class="sa-stat-card accent-blue skeleton" style="height:108px;border:none;"></div>
          <div class="sa-stat-card accent-gold skeleton" style="height:108px;border:none;"></div>
          <div class="sa-stat-card accent-green skeleton" style="height:108px;border:none;"></div>
          <div class="sa-stat-card accent-red skeleton" style="height:108px;border:none;"></div>
          <div class="sa-stat-card accent-blue skeleton" style="height:108px;border:none;"></div>
          <div class="sa-stat-card accent-gold skeleton" style="height:108px;border:none;"></div>
          <div class="sa-stat-card accent-green skeleton" style="height:108px;border:none;"></div>
          <div class="sa-stat-card accent-red skeleton" style="height:108px;border:none;"></div>
        </div>

        <!-- Institutional completeness -->
        <div class="sa-section">
          <div class="sa-section-header">
            <h2 class="sa-section-title">Institutional Structure</h2>
            <a href="/src/modules/super_admin/structure/structure.html" class="btn btn-sm btn-outline">Manage →</a>
          </div>
          <div class="sa-section-body">
            <div class="struct-grid" id="struct-grid">
              <div class="struct-item"><div class="struct-item-count skeleton" style="width:60px;height:36px;margin:0 auto;"></div><div class="struct-item-label">Faculties</div></div>
              <div class="struct-item"><div class="struct-item-count skeleton" style="width:60px;height:36px;margin:0 auto;"></div><div class="struct-item-label">Departments</div></div>
              <div class="struct-item"><div class="struct-item-count skeleton" style="width:60px;height:36px;margin:0 auto;"></div><div class="struct-item-label">Programmes</div></div>
            </div>
          </div>
        </div>

        <!-- Seasons table -->
        <div class="sa-section">
          <div class="sa-section-header">
            <h2 class="sa-section-title">All Seasons</h2>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table" id="seasons-table">
              <thead><tr>
                <th>Season</th><th>Status</th><th>Placements</th><th>Start</th><th>End</th>
              </tr></thead>
              <tbody id="seasons-tbody"><tr><td colspan="5" class="text-center" style="padding:24px;color:var(--text-muted);">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>

        <!-- Audit log -->
        <div class="sa-section">
          <div class="sa-section-header">
            <h2 class="sa-section-title">Recent Audit Activity</h2>
            <a href="/src/modules/super_admin/system-audit/system-audit.html" class="btn btn-sm btn-outline">View all →</a>
          </div>
          <div class="sa-section-body">
            <div class="audit-list" id="audit-list">
              <p style="color:var(--text-muted);font-size:13px;">Loading…</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="shell-overlays"></div>
<script type="module" src="./dashboard.js"></script>
</body>
</html>
