<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a1a48">
  <title>IAMS — Admin</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>

<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">

      <!-- ── DASHBOARD ─────────────────────────────────────────────────── -->
      <section id="view-dashboard" class="page-view">
        <div class="page-container">
          <div class="page-header">
            <div>
              <h1 class="page-title">Admin Dashboard</h1>
              <p style="font-size:13px;color:var(--text-secondary);margin-top:4px;" id="adash-season-label">
                Loading season…
              </p>
            </div>
          </div>

          <!-- Stat cards -->
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px;"
               id="adash-stats">
            <div class="card metric-card">
              <div class="sec-label">Total Students</div>
              <div id="stat-students" style="font-size:var(--text-display);font-weight:700;">—</div>
            </div>
            <div class="card metric-card">
              <div class="sec-label">Submitted</div>
              <div id="stat-submitted" style="font-size:var(--text-display);font-weight:700;color:var(--ttu-blue);">—</div>
            </div>
            <div class="card metric-card">
              <div class="sec-label">Assigned</div>
              <div id="stat-assigned" style="font-size:var(--text-display);font-weight:700;color:var(--green);">—</div>
            </div>
            <div class="card metric-card">
              <div class="sec-label">Flagged</div>
              <div id="stat-flagged" style="font-size:var(--text-display);font-weight:700;color:var(--amber);">—</div>
            </div>
            <div class="card metric-card">
              <div class="sec-label">Rejected</div>
              <div id="stat-rejected" style="font-size:var(--text-display);font-weight:700;color:var(--ttu-red);">—</div>
            </div>
            <div class="card metric-card">
              <div class="sec-label">Letters (season)</div>
              <div id="stat-letters" style="font-size:var(--text-display);font-weight:700;">—</div>
            </div>
          </div>

          <!-- Placements by zone table -->
          <div class="card">
            <div class="sec-label" style="margin-bottom:12px;">Placements by Zone</div>
            <div id="adash-zone-table">
              <div class="skeleton skel-text" style="width:70%;margin-bottom:8px;"></div>
              <div class="skeleton skel-text" style="width:50%;"></div>
            </div>
          </div>
        </div>
      </section>




    </main>
  </div>
</div>

<div id="shell-overlays"></div>
<script type="module" src="./dashboard.js"></script>
</body>
</html>
