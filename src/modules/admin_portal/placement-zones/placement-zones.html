<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('iams_theme_mode');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>Placement Zones | TTU IAMS Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">
      <style>
        .accordion-item {
          border: 1px solid var(--border-default);
          border-radius: var(--radius-md);
          margin-bottom: var(--space-xs);
          background: var(--bg-card);
          overflow: hidden;
        }
        .accordion-header {
          display: flex;
          align-items: center;
          padding: var(--space-md);
          cursor: pointer;
          user-select: none;
          transition: background 0.2s;
        }
        .accordion-header:hover {
          background: var(--bg-hover);
        }
        .accordion-title {
          flex: 1;
          font-weight: 600;
          color: var(--text-primary);
          display: flex;
          align-items: center;
          gap: var(--space-sm);
        }
        .accordion-stats {
          font-size: var(--text-sm);
          color: var(--text-secondary);
          display: flex;
          align-items: center;
          gap: var(--space-md);
        }
        .progress-bar-container {
          width: 120px;
          height: 6px;
          background: var(--bg-surface);
          border-radius: var(--radius-pill);
          overflow: hidden;
        }
        .progress-bar-fill {
          height: 100%;
          background: var(--ttu-blue);
          border-radius: var(--radius-pill);
        }
        .chevron {
          width: 20px;
          height: 20px;
          color: var(--text-muted);
          transition: transform 0.2s;
        }
        .accordion-item.is-expanded > .accordion-header .chevron {
          transform: rotate(90deg);
        }
        .accordion-content {
          display: none;
          padding: 0 var(--space-md) var(--space-md) calc(var(--space-md) + 24px);
          border-top: 1px solid var(--border-default);
        }
        .accordion-item.is-expanded > .accordion-content {
          display: block;
        }
        
        .level-district > .accordion-content {
          padding-left: calc(var(--space-md) + 24px);
        }
        .level-town > .accordion-content {
          padding-left: calc(var(--space-md) + 24px);
        }

        /* Placement cards inside town */
        .placement-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: var(--space-md);
          margin-top: var(--space-md);
        }
        .placement-card {
          background: var(--bg-card);
          border: 1px solid var(--border-default);
          border-radius: var(--radius-md);
          padding: var(--space-md);
          display: flex;
          flex-direction: column;
          gap: var(--space-sm);
        }
        .placement-card-header {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
        }
        .placement-student-name {
          font-weight: 600;
          color: var(--text-primary);
        }
        .placement-company {
          font-size: var(--text-sm);
          color: var(--text-secondary);
        }
        .placement-status {
          font-size: var(--text-xs);
          padding: 2px 8px;
          border-radius: var(--radius-pill);
          background: var(--bg-info);
          color: var(--ttu-blue);
          font-weight: 500;
        }
        .placement-status.unassigned {
          background: var(--bg-warning);
          color: var(--text-primary);
        }
        .placement-actions {
          margin-top: auto;
          padding-top: var(--space-sm);
          border-top: 1px solid var(--border-default);
          display: flex;
          justify-content: flex-end;
        }
        .unresolved-banner {
          background: var(--bg-warning);
          border: 1px solid var(--border-strong);
          border-radius: var(--radius-md);
          padding: var(--space-md);
          margin-bottom: var(--space-lg);
        }
      </style>
      <div class="page-container">
        <div class="page-header">
          <div>
            <h1 class="page-title">Placement Zones</h1>
            <p class="page-subtitle">Geographic distribution of student placements (Region → District → Town).</p>
          </div>
        </div>

        <!-- Unresolved Placements Section -->
        <div id="unresolved-container" style="display:none">
          <div class="unresolved-banner">
            <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" id="unresolved-toggle">
              <div style="font-weight:600; color:var(--text-primary);">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" style="vertical-align:bottom; margin-right:8px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                Unresolved Locations (<span id="unresolved-count">0</span>)
              </div>
              <svg class="chevron" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>
            <div id="unresolved-content" style="display:none; margin-top:16px;">
              <div class="placement-grid" id="unresolved-grid"></div>
            </div>
          </div>
        </div>

        <div id="regions-container">
          <!-- Regions will be populated here -->
          <div id="regions-loading" style="padding:40px; text-align:center; color:var(--text-muted)">Loading regions...</div>
        </div>
      </div>
      
      <!-- Assign Supervisor Modal (Reused concept) -->
      <div id="assign-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
        <div class="modal-panel">
          <div class="modal-header">
            <h2 class="modal-title">Assign Supervisor</h2>
            <button id="assign-modal-close" class="modal-close-btn" aria-label="Close">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="field" style="margin-top:16px">
            <label class="field-label" for="assign-zone-select">Select Zone</label>
            <select id="assign-zone-select" class="field-input">
              <option value="">— Select a Zone —</option>
            </select>
            <div style="font-size:12px; color:var(--text-secondary); margin-top:4px;">Supervisors are assigned at the zone level.</div>
          </div>
          <div class="modal-actions">
            <button id="assign-save" class="btn btn-primary">Save Assignment</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script type="module" src="./placement-zones.js"></script>
</body>
</html>
