<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('iams_theme_mode');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>Finance | TTU IAMS Admin</title>
  <meta name="description" content="Payments collected from students for logbook access and AI report generation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">
      <div class="page-container">
        <div id="page-loading" class="page-loading-overlay"><div class="spinner-lg"></div></div>

        <div class="page-header">
          <div>
            <h1 class="page-title">Finance</h1>
            <p class="page-subtitle">Payments collected from students across seasons.</p>
          </div>
          <div>
            <select id="season-filter" class="field-input" style="min-width:200px" disabled>
              <option value="">Loading seasons…</option>
            </select>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:var(--space-lg); margin-bottom:var(--space-lg);">
          <div class="card">
            <div style="font-size:13px; color:var(--text-muted);">Total Collected</div>
            <div style="font-size:28px; font-weight:700; color:var(--text-primary); margin-top:4px;" id="fin-total">GH¢ 0.00</div>
            <div style="font-size:12px; color:var(--text-secondary); margin-top:2px;"><span id="fin-count">0</span> payment(s)</div>
          </div>
          <div class="card">
            <div style="font-size:13px; color:var(--text-muted);">Logbook Access</div>
            <div style="font-size:28px; font-weight:700; color:var(--text-primary); margin-top:4px;" id="fin-logbook-total">GH¢ 0.00</div>
            <div style="font-size:12px; color:var(--text-secondary); margin-top:2px;"><span id="fin-logbook-count">0</span> student(s) paid</div>
          </div>
          <div class="card">
            <div style="font-size:13px; color:var(--text-muted);">Report Generation</div>
            <div style="font-size:28px; font-weight:700; color:var(--text-primary); margin-top:4px;" id="fin-report-total">GH¢ 0.00</div>
            <div style="font-size:12px; color:var(--text-secondary); margin-top:2px;"><span id="fin-report-count">0</span> student(s) paid</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header-row">
            <h2 class="card-title">Payment Records</h2>
            <div style="font-size:13px;color:var(--text-muted)">Total: <strong id="fin-table-count">0</strong></div>
          </div>

          <div id="payments-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Index Number</th>
                  <th>For</th>
                  <th>Amount</th>
                  <th>Reference</th>
                  <th class="text-right">Paid</th>
                </tr>
              </thead>
              <tbody id="payments-tbody">
                <tr><td colspan="6" class="text-center text-muted" style="padding:40px">Loading payments…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="shell-overlays"></div>

<script type="module" src="./finance.js"></script>
</body>
</html>
