<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('iams_theme_mode');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>Batch Assign Placements | TTU IAMS Admin</title>
  <meta name="description" content="Review student placement submissions and batch assign them to geographic zones.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">
      <div class="page-container">
  <div id="page-loading" class="page-loading-overlay"><div class="spinner-lg"></div></div>

  <div class="page-header">
    <div>
      <h1 class="page-title">Assign Placements</h1>
      <p class="page-subtitle">Batch review submitted placements and assign them to zones.</p>
    </div>
    <div style="display:flex;gap:12px">
      <select id="season-filter" class="field-input" style="min-width:200px" disabled>
        <option value="">Loading seasons…</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-header-row" style="margin-bottom:16px">
      <div style="display:flex;gap:16px;flex:1">
        <!-- Status filter tabs -->
        <div class="tabs-nav" style="border:none;margin:0" id="status-tabs">
          <button class="tab-btn active" data-status="all">All (<span id="count-all">0</span>)</button>
          <button class="tab-btn" data-status="submitted">Awaiting Review (<span id="count-submitted">0</span>)</button>
          <button class="tab-btn" data-status="assigned">Assigned (<span id="count-assigned">0</span>)</button>
          <button class="tab-btn" data-status="flagged">Flagged (<span id="count-flagged">0</span>)</button>
          <button class="tab-btn" data-status="rejected">Rejected (<span id="count-rejected">0</span>)</button>
        </div>
      </div>
      <!-- Batch Actions (only visible in 'submitted' tab) -->
      <div id="batch-actions" style="display:flex;gap:8px;align-items:center">
        <span class="text-muted" style="font-size:13px"><span id="selected-count">0</span> selected</span>
        <select id="batch-zone-select" class="field-input" style="width:160px;height:32px;font-size:13px" disabled>
          <option value="">— Select Zone —</option>
        </select>
        <button id="batch-assign-btn" class="btn-sm btn-sm--primary" disabled>Assign to Zone</button>
      </div>
    </div>

    <!-- Table -->
    <div id="placements-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:40px;text-align:center">
              <input type="checkbox" id="select-all" class="field-checkbox">
            </th>
            <th>Student</th>
            <th>Company &amp; Location</th>
            <th>Dates &amp; GPS</th>
            <th>Status / Zone</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="placements-tbody">
          <tr><td colspan="6" class="text-center text-muted" style="padding:40px">Loading placements…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  </div>
</main>
</div>
</div>
<div id="shell-overlays"></div>

<script type="module" src="./placements.js"></script>
</body>
</html>
