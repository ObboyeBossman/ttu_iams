<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('iams_theme_mode');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>Assigned Students | TTU IAMS</title>
  <meta name="description" content="View students assigned to your zones.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
<div id="app-shell"></div>

<main id="page-content" class="page-content">
  <div class="page-header">
    <div>
      <h1 class="page-title">Assigned Students</h1>
      <p class="page-subtitle">Students placed in your assigned zones.</p>
    </div>
  </div>
  
  <div class="coming-soon-card coming-soon-card--blue">
    <div class="coming-soon-content">
      <div class="coming-soon-badge">Phase 2 Feature</div>
      <h2 class="coming-soon-title">Student Tracking Coming Soon</h2>
      <p class="coming-soon-text">Detailed student list and logbook review for school supervisors will arrive in Phase 2.</p>
    </div>
  </div>
</main>

<script type="module" src="./students.js"></script>
</body>
</html>
