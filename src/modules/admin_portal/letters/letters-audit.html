<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>Letters Audit | TTU IAMS Admin</title>
  <meta name="description" content="Audit log of all attachment letters generated by students.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">
      <div class="page-container">
  <div id="page-loading" class="page-loading-overlay"><div class="spinner-lg"></div></div>

  <div class="page-header">
    <div>
      <h1 class="page-title">Letters Audit Log</h1>
      <p class="page-subtitle">View all attachment letters generated by students across seasons.</p>
    </div>
    <div>
      <select id="season-filter" class="field-input" style="min-width:200px" disabled>
        <option value="">Loading seasons…</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-header-row">
      <h2 class="card-title">Generated Letters</h2>
      <div style="font-size:13px;color:var(--text-muted)">Total: <strong id="total-letters">0</strong></div>
    </div>

    <!-- Table -->
    <div id="letters-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Student</th>
            <th>Index Number</th>
            <th>Program & Level</th>
            <th>Letters Generated</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="letters-tbody">
          <tr><td colspan="5" class="text-center text-muted" style="padding:40px">Loading letters…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  </div>
</main>
</div>
</div>
<div id="shell-overlays"></div>

<!-- Letters Modal -->
<div id="letters-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-panel" style="max-width:700px">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Letters for <span id="lm-student-name" style="color:var(--ttu-blue)"></span></h2>
      <button id="modal-close" class="modal-close-btn" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div style="padding:var(--space-lg);max-height:60vh;overflow-y:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th>Date Generated</th>
            <th>Company & Location</th>
            <th>Verification Code</th>
          </tr>
        </thead>
        <tbody id="lm-tbody">
          <tr><td colspan="3" class="text-center text-muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="modal-actions">
      <button id="lm-close-btn" class="btn btn-secondary">Close</button>
    </div>
  </div>
</div>

<script type="module" src="./letters-audit.js"></script>
</body>
</html>
