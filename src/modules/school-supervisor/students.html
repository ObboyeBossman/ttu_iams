<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('iams_theme_mode');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>Assigned Students | TTU IAMS</title>
  <meta name="description" content="View students assigned to your zones.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">
      <section id="view-students" class="page-view active">
  <div class="page-header">
    <div>
      <h1 class="page-title">Assigned Students</h1>
      <p class="page-subtitle">Students placed in your assigned zones.</p>
    </div>
  </div>
  
  <div class="card" style="margin-top:24px">
    <div class="card-header-row">
      <h2 class="card-title">Students in My Zones</h2>
    </div>
    <div style="overflow-x:auto;">
      <table class="table" style="width:100%">
        <thead>
          <tr>
            <th>Student</th>
            <th>Index Number</th>
            <th>Programme</th>
            <th>Company</th>
            <th>Location</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="students-tbody">
          <tr><td colspan="6" class="text-center py-4">Loading students...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

      </section>
    </main>
  </div>
</div>
<div id="shell-overlays"></div>

<script type="module" src="./students.js"></script>
</body>
</html>
