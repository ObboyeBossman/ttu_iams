<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('iams_theme_mode');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>Students Directory | TTU IAMS Admin</title>
  <meta name="description" content="View and manage student records and profiles.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
<div id="app-shell"></div>

<main id="page-content" class="page-content">
  <div class="page-header">
    <div>
      <h1 class="page-title">Students Directory</h1>
      <p class="page-subtitle">View and search through all registered student profiles.</p>
    </div>
  </div>

  <div class="coming-soon-card coming-soon-card--blue">
    <div class="coming-soon-illustration">
      <svg viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="56" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
        <path d="M40 80 Q60 50 80 80" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" fill="none"/>
        <circle cx="60" cy="45" r="12" fill="#1d4ed8"/>
      </svg>
    </div>
    <div class="coming-soon-content">
      <div class="coming-soon-badge">Phase 2 Feature</div>
      <h2 class="coming-soon-title">Students Directory Coming Soon</h2>
      <p class="coming-soon-text">
        A comprehensive student search and filtering interface will be available in Phase 2. Currently, student accounts are managed via the generic Users panel.
      </p>
    </div>
  </div>
</main>

<script type="module" src="./students.js"></script>
</body>
</html>
