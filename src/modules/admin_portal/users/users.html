<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — IAMS Admin</title>
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
  <style>
    /* Users Master-Detail Layout */
    .users-workspace {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      height: calc(100vh - 116px); /* Adjust based on topbar + tabs height */
      overflow: hidden;
      background: var(--bg-default);
    }

    .directory-panel {
      border-right: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
    }

    .directory-search {
      padding: 16px;
      border-bottom: 1px solid var(--border-default);
    }

    .directory-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .user-item {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.2s;
    }

    .user-item:hover {
      background: var(--bg-prefix);
    }

    .user-item.active {
      background: var(--ttu-blue-surface);
      border-right: 2px solid var(--ttu-blue);
    }

    .user-item-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .user-item-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .details-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: var(--bg-default);
    }

    .details-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-align: center;
    }

    .details-card {
      max-width: 800px;
      margin: 0 auto;
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .details-group-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .details-value {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Overview Tab - Dashboard style */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .users-workspace {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }
      .directory-panel {
        border-right: none;
        border-bottom: 1px solid var(--border-default);
        max-height: 400px;
      }
    }
  </style>
</head>
<body>

<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">
      
      <!-- Users Module Wrapper -->
      <div id="users-module-root">
        
        <!-- Tab Content: Overview -->
        <section id="tab-overview" class="tab-view active">
          <div class="page-container">
            <div class="page-header">
              <h1 class="page-title">Users Overview</h1>
            </div>
            
            <div class="overview-grid" id="users-stats-grid">
              <!-- Summary cards populated by users.js -->
              <div class="card metric-card skeleton-card"></div>
              <div class="card metric-card skeleton-card"></div>
              <div class="card metric-card skeleton-card"></div>
            </div>

            <div class="card">
              <div class="sec-label" style="margin-bottom:16px;">Recently Added Users</div>
              <div id="recent-users-list">
                <div class="skeleton skel-text" style="width:100%; height:40px; margin-bottom:12px;"></div>
                <div class="skeleton skel-text" style="width:100%; height:40px; margin-bottom:12px;"></div>
                <div class="skeleton skel-text" style="width:100%; height:40px;"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- Tab Content: Directories (Students, Admins) -->
        <section id="tab-directory" class="tab-view" style="display:none;">
          <div class="users-workspace">
            
            <!-- Left Panel: Directory -->
            <aside class="directory-panel">
              <div class="directory-search">
                <input type="text" id="user-search-input" class="inp" placeholder="Search users...">
                <div id="directory-filters" style="margin-top:12px; display:flex; gap:8px;">
                  <!-- Filters populated by users.js -->
                </div>
              </div>
              <div id="user-directory-list" class="directory-list">
                <!-- User items populated by users.js -->
              </div>
            </aside>

            <!-- Right Panel: Details -->
            <article class="details-panel" id="user-details-panel">
              <div class="details-empty">
                <i data-lucide="user" style="width:48px; height:48px; margin-bottom:16px; opacity:0.2;"></i>
                <p>Select a user to view details.</p>
              </div>
            </article>

          </div>
        </section>

      </div>

    </main>
  </div>
</div>

<div id="shell-overlays"></div>

<script type="module" src="./users.js"></script>
</body>
</html>
