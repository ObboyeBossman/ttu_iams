<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('iams_theme_mode');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>Season Management | TTU IAMS Admin</title>
  <meta name="description" content="Create and manage industrial attachment seasons — open, close, and archive academic seasons.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
<div id="app" class="app-shell">
  <div class="main-content" id="main-content">
    <main class="content-area" id="page-content">
      <div class="page-container">
  <div id="page-loading" class="page-loading-overlay"><div class="spinner-lg"></div></div>

  <div class="page-header">
    <div>
      <h1 class="page-title">Season Management</h1>
      <p class="page-subtitle">Create, open, close, and archive academic attachment seasons.</p>
    </div>
    <button id="create-season-btn" class="btn btn-primary">
      <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Season
    </button>
  </div>

  <!-- Seasons list -->
  <div class="card">
    <div id="seasons-skeleton">
      <div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div>
    </div>
    <div id="seasons-empty" class="empty-state" style="display:none">
      <svg class="empty-state-icon" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="12" width="48" height="44" rx="4" fill="#e8f0fe" stroke="#93c5fd" stroke-width="2"/>
        <rect x="8" y="12" width="48" height="12" rx="4" fill="#93c5fd" opacity="0.4"/>
        <line x1="20" y1="36" x2="44" y2="36" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="44" x2="36" y2="44" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p class="empty-state-title">No seasons yet</p>
      <p class="empty-state-text">Create your first attachment season to get started.</p>
    </div>
    <div id="seasons-table-wrap" style="display:none">
      <table class="data-table">
        <thead>
          <tr>
            <th>Season Name</th>
            <th>Start — End</th>
            <th>Placement Window</th>
            <th>Status</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="seasons-tbody"></tbody>
      </table>
    </div>
  </div>
  </div>
</main>

<!-- Create / Edit Season Modal -->
<div id="season-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">New Season</h2>
      <button id="modal-close" class="modal-close-btn" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="season-form" novalidate>
      <input type="hidden" id="season-id" value="">
      <div class="field">
        <label class="field-label" for="s-name">Season Name <span class="required">*</span></label>
        <input type="text" id="s-name" class="field-input" placeholder="e.g. 2025/2026 Semester 2" required>
        <div class="field-error" id="err-s-name"></div>
      </div>
      <div class="field-row-2col">
        <div class="field">
          <label class="field-label" for="s-start">Start Date <span class="required">*</span></label>
          <input type="date" id="s-start" class="field-input" required>
          <div class="field-error" id="err-s-start"></div>
        </div>
        <div class="field">
          <label class="field-label" for="s-end">End Date <span class="required">*</span></label>
          <input type="date" id="s-end" class="field-input" required>
          <div class="field-error" id="err-s-end"></div>
        </div>
      </div>
      <div class="field-row-2col">
        <div class="field">
          <label class="field-label" for="s-window-start">Placement Window Start <span class="required">*</span></label>
          <input type="date" id="s-window-start" class="field-input" required>
          <div class="field-error" id="err-s-window-start"></div>
        </div>
        <div class="field">
          <label class="field-label" for="s-window-end">Placement Window End <span class="required">*</span></label>
          <input type="date" id="s-window-end" class="field-input" required>
          <div class="field-error" id="err-s-window-end"></div>
        </div>
      </div>
      <div class="form-error-banner" id="modal-error" style="display:none">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="modal-error-msg"></span>
      </div>
      <div class="modal-actions">
        <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
        <button type="submit" id="modal-submit" class="btn btn-primary">
          <span class="btn-spinner" id="modal-spinner" style="display:none"></span>
          Save Season
        </button>
      </div>
    </form>
  </div>
</div>
</div>
</div>
<div id="shell-overlays"></div>

<script type="module" src="./seasons.js"></script>
</body>
</html>
