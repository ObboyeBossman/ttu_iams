<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  <title>IAMS — Takoradi Technical University</title>
  <meta name="description" content="Industrial Attachment Management System — Takoradi Technical University. Sign in to manage your industrial attachment.">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; font-family: 'Inter', system-ui, sans-serif;
      background: #f4f6fc; color: #141b2b;
      display: flex; align-items: center; justify-content: center;
      transition: background-color 0.3s, color 0.3s;
    }
    
    .splash {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; padding: 32px; text-align: center;
      animation: fade-in 0.6s ease-out;
    }

    .splash-logo-container {
      width: 110px; height: 110px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 16px 40px rgba(0, 32, 88, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.6);
      animation: pulse-glow 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .splash-logo-container img {
      width: 72px; height: 72px;
      object-fit: contain;
      drop-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .splash-text h1 { 
      font-size: 26px; font-weight: 700; color: #002058; 
      letter-spacing: -0.02em; margin-bottom: 6px;
    }
    
    .splash-text p { 
      font-size: 14px; font-weight: 600; color: #444650; 
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    
    .splash-slogan {
      font-size: 11px; color: #F0A500; font-weight: 700;
      letter-spacing: 0.2em; margin-top: 8px; opacity: 0.9;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(0, 32, 88, 0.1);
      border-top-color: #002058;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
      margin-top: 16px;
    }

    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      html, body {
        background: #101415; color: #e1e2e9;
      }
      .splash-logo-container {
        background: rgba(29, 32, 36, 0.6);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.1);
      }
      .splash-text h1 { color: #ffffff; }
      .splash-text p { color: #c4c6d1; }
      .spinner {
        border-color: rgba(178, 197, 255, 0.15);
        border-top-color: #b2c5ff;
      }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse-glow { 
      0%, 100% { transform: scale(1); } 
      50% { transform: scale(1.03); } 
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-logo-container">
      <img src="/assets/logo/ttu_logo_no_text.png" alt="TTU Logo">
    </div>
    <div class="splash-text">
      <h1>Takoradi Technical University</h1>
      <p>IAMS Portal</p>
      <div class="splash-slogan">ADWEN, AKOMA NA NSA MA MPUNTU</div>
    </div>
    <div class="spinner" aria-label="Loading…"></div>
  </div>

  <script type="module">
    import { redirectIfAlreadyAuthenticated, redirectToLogin } from '/src/modules/auth/auth-guard.js';

    (async () => {
      try {
        await redirectIfAlreadyAuthenticated();
        // If not already authenticated, redirectIfAlreadyAuthenticated does nothing,
        // so we redirect to login ourselves.
        redirectToLogin();
      } catch (e) {
        console.error('[index] redirect error:', e);
        redirectToLogin();
      }
    })();
  </script>
</body>
</html>
